<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Flame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Mea+Culpa&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#03040c;
    --void-2:#0a0714;
    --ember:#6e190a;
    --flame:#ff7a2a;
    --gold:#ffd27a;
    --starlight:#f5eee0;
    --ash:#8d877e;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:var(--void);
    overflow-x:hidden;
  }

  body{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    font-family:'Space Mono',monospace;
    color:var(--starlight);
  }

  canvas#sky{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    background:radial-gradient(120% 80% at 50% 100%, #1a0f08 0%, var(--void-2) 45%, var(--void) 100%);
  }

  main{
    position:relative;
    z-index:2;
    width:100%;
    max-width:720px;
    padding:14vh 24px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--ash);
    margin:0 0 28px;
  }

  .typewriter{
    font-size:clamp(15px, 2.4vw, 19px);
    line-height:1.9;
    font-weight:400;
    max-width:620px;
    min-height:1.9em;
    color:var(--starlight);
  }

  .typewriter .shine{
    background:linear-gradient(100deg, var(--starlight) 30%, var(--gold) 45%, #fff 50%, var(--gold) 55%, var(--starlight) 70%);
    background-size:240% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 5s linear infinite;
  }

  .signature-line{
    margin-top:30px;
    font-size:clamp(26px, 5vw, 38px);
    font-family:'Mea Culpa',cursive;
    color:var(--gold);
    min-height:1.4em;
  }

  .signature-line .name{
    background:linear-gradient(100deg, var(--gold) 25%, #fff7e0 45%, var(--flame) 55%, var(--gold) 75%);
    background-size:240% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 4s linear infinite;
  }

  @keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
  }

  .cursor{
    display:inline-block;
    width:2px;
    margin-left:2px;
    background:var(--gold);
    animation:blink 0.9s step-end infinite;
  }

  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
  }

  .cursor.done{display:none;}

  .scene{
    position:relative;
    width:100%;
    max-width:560px;
    margin-top:6vh;
    display:flex;
    justify-content:center;
  }

  .scene svg{
    width:100%;
    height:auto;
    display:block;
  }

  .player{
    position:relative;
    z-index:2;
    width:100%;
    max-width:380px;
    margin:2vh 0 8vh;
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 18px;
    border:1px solid rgba(245,238,224,0.14);
    border-radius:999px;
    background:rgba(10,7,20,0.45);
    backdrop-filter:blur(6px);
    opacity:0;
    transform:translateY(8px);
    transition:opacity 1.1s ease, transform 1.1s ease;
  }

  .player.show{
    opacity:1;
    transform:translateY(0);
  }

  .play-btn{
    flex:none;
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    position:relative;
    background:radial-gradient(circle at 35% 30%, var(--gold), var(--flame) 55%, var(--ember) 100%);
    box-shadow:0 0 0 1px rgba(255,210,122,0.3), 0 0 18px rgba(255,122,42,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .play-btn svg{width:16px;height:16px;}
  .play-btn .icon-pause{display:none;}
  .play-btn.playing .icon-play{display:none;}
  .play-btn.playing .icon-pause{display:block;}

  .track-info{
    flex:1;
    min-width:0;
    text-align:left;
  }

  .track-title{
    font-size:13px;
    letter-spacing:0.06em;
    color:var(--starlight);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .track-sub{
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ash);
    margin-top:3px;
  }

  .progress{
    margin-top:8px;
    height:3px;
    border-radius:2px;
    background:rgba(245,238,224,0.12);
    cursor:pointer;
    position:relative;
  }

  .progress-fill{
    position:absolute;
    inset:0 auto 0 0;
    width:0%;
    border-radius:2px;
    background:linear-gradient(90deg, var(--flame), var(--gold));
  }

  footer{
    position:relative;
    z-index:2;
    padding-bottom:5vh;
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ash);
    opacity:0.6;
  }

  @media (prefers-reduced-motion: reduce){
    .typewriter .shine,
    .signature-line .name,
    .cursor{animation:none;}
    .flame-group{animation:none !important;}
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<main>
  <p class="eyebrow">a fire kept for two</p>
  <p class="typewriter" id="typewriter" aria-live="polite"></p>

  <div class="scene" aria-hidden="true">
    <svg viewBox="0 0 560 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="fireGlow" cx="50%" cy="55%" r="55%">
          <stop offset="0%" stop-color="#ff9a4d" stop-opacity="0.45"/>
          <stop offset="60%" stop-color="#ff5a1f" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#6e190a"/>
          <stop offset="45%" stop-color="#d8350f"/>
          <stop offset="100%" stop-color="#ff8a2a"/>
        </linearGradient>
        <linearGradient id="flameMid" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#c92e0e"/>
          <stop offset="50%" stop-color="#ff8a1f"/>
          <stop offset="100%" stop-color="#ffc23d"/>
        </linearGradient>
        <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#ff8a1f"/>
          <stop offset="55%" stop-color="#ffcf4d"/>
          <stop offset="100%" stop-color="#fff3c2"/>
        </linearGradient>
        <linearGradient id="logGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#5a3a26"/>
          <stop offset="55%" stop-color="#3c2417"/>
          <stop offset="100%" stop-color="#1c0f08"/>
        </linearGradient>
        <style>
          @keyframes swayA{0%{transform:rotate(-3deg) scaleY(1);}50%{transform:rotate(3.4deg) scaleY(1.05);}100%{transform:rotate(-3deg) scaleY(1);}}
          @keyframes swayB{0%{transform:rotate(3.2deg) scaleY(1.02);}50%{transform:rotate(-3.6deg) scaleY(0.95);}100%{transform:rotate(3.2deg) scaleY(1.02);}}
          @keyframes flick{0%,100%{opacity:1;}50%{opacity:0.84;}}
          @keyframes glowPulse{0%,100%{opacity:0.85;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
          @keyframes emberRise{0%{transform:translateY(0) translateX(0);opacity:0.9;}100%{transform:translateY(-130px) translateX(var(--dx,6px));opacity:0;}}
          .flame-group{transform-origin:bottom center;}
          .fA-out{transform-origin:225px 300px;animation:swayA 2.6s ease-in-out infinite;}
          .fA-mid{transform-origin:225px 296px;animation:swayB 2.1s ease-in-out infinite;}
          .fA-in{transform-origin:225px 292px;animation:swayA 1.8s ease-in-out infinite, flick 1.3s ease-in-out infinite;}
          .fB-out{transform-origin:335px 300px;animation:swayB 2.4s ease-in-out infinite;}
          .fB-mid{transform-origin:335px 296px;animation:swayA 2s ease-in-out infinite;}
          .fB-in{transform-origin:335px 292px;animation:swayB 1.7s ease-in-out infinite, flick 1.5s ease-in-out infinite;}
          .glow{animation:glowPulse 2.6s ease-in-out infinite;}
          .ember{animation:emberRise 3.6s ease-in infinite;}
        </style>
      </defs>

      <ellipse cx="280" cy="318" rx="190" ry="26" fill="#000" opacity="0.45"/>
      <ellipse class="glow" cx="280" cy="285" rx="180" ry="140" fill="url(#fireGlow)"/>

      <g stroke="#241409" stroke-width="2">
        <rect x="190" y="306" width="100" height="13" rx="5" fill="url(#logGrad)" transform="rotate(-16 240 312)"/>
        <rect x="270" y="306" width="100" height="13" rx="5" fill="url(#logGrad)" transform="rotate(16 320 312)"/>
        <rect x="215" y="308" width="130" height="11" rx="5" fill="url(#logGrad)" transform="rotate(-3 280 313)"/>
      </g>

      <g class="flame-group fA-out"><path d="M225 308 C198 280 194 248 211 220 C198 240 191 260 201 280 C180 252 190 218 217 188 C204 218 211 240 228 252 C235 224 224 200 238 174 C252 200 245 224 256 250 C270 230 266 204 256 180 C276 204 273 234 260 258 C270 244 277 264 267 284 C257 270 254 290 241 308 Z" fill="url(#flameOuter)"/></g>
      <g class="flame-group fA-mid"><path d="M225 308 C207 286 204 258 215 234 C206 250 202 266 210 284 C194 260 202 232 222 206 C212 232 218 250 230 260 C236 238 228 218 238 200 C249 218 244 240 251 258 C262 242 259 220 250 198 C266 220 263 246 254 266 C261 254 265 270 257 286 C249 276 247 292 237 308 Z" fill="url(#flameMid)"/></g>
      <g class="flame-group fA-in"><path d="M225 308 C212 290 211 270 220 252 C211 264 208 276 214 290 C202 272 208 250 223 230 C215 250 220 264 229 272 C234 256 228 240 236 224 C245 240 241 256 247 270 C256 258 254 240 247 224 C259 240 257 260 250 276 C256 268 258 280 252 292 C246 284 244 296 237 308 Z" fill="url(#flameInner)"/></g>

      <g class="flame-group fB-out"><path d="M335 308 C308 280 304 248 321 220 C308 240 301 260 311 280 C290 252 300 218 327 188 C314 218 321 240 338 252 C345 224 334 200 348 174 C362 200 355 224 366 250 C380 230 376 204 366 180 C386 204 383 234 370 258 C380 244 387 264 377 284 C367 270 364 290 351 308 Z" fill="url(#flameOuter)"/></g>
      <g class="flame-group fB-mid"><path d="M335 308 C317 286 314 258 325 234 C316 250 312 266 320 284 C304 260 312 232 332 206 C322 232 328 250 340 260 C346 238 338 218 348 200 C359 218 354 240 361 258 C372 242 369 220 360 198 C376 220 373 246 364 266 C371 254 375 270 367 286 C359 276 357 292 347 308 Z" fill="url(#flameMid)"/></g>
      <g class="flame-group fB-in"><path d="M335 308 C322 290 321 270 330 252 C321 264 318 276 324 290 C312 272 318 250 333 230 C325 250 330 264 339 272 C344 256 338 240 346 224 C355 240 351 256 357 270 C366 258 364 240 357 224 C369 240 367 260 360 276 C366 268 368 280 362 292 C356 284 354 296 347 308 Z" fill="url(#flameInner)"/></g>

      <g class="ember" style="--dx:10px;animation-delay:0s"><circle cx="245" cy="262" r="2" fill="#ffb24d"/></g>
      <g class="ember" style="--dx:-8px;animation-delay:.7s"><circle cx="315" cy="255" r="1.8" fill="#ff8a2a"/></g>
      <g class="ember" style="--dx:6px;animation-delay:1.3s"><circle cx="280" cy="270" r="1.6" fill="#ffd27a"/></g>
      <g class="ember" style="--dx:-12px;animation-delay:1.9s"><circle cx="300" cy="248" r="1.8" fill="#ff8a2a"/></g>
      <g class="ember" style="--dx:9px;animation-delay:2.5s"><circle cx="260" cy="245" r="1.5" fill="#ffb24d"/></g>
    </svg>
  </div>

  <div class="player" id="player">
    <button class="play-btn" id="playBtn" aria-label="Play Here Comes The Sun">
      <svg class="icon-play" viewBox="0 0 24 24" fill="none"><path d="M7 5v14l12-7L7 5z" fill="#1c0f08"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" fill="none"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" fill="#1c0f08"/></svg>
    </button>
    <div class="track-info">
      <div class="track-title">Here Comes The Sun</div>
      <div class="track-sub">for Jorge</div>
      <div class="progress" id="progress"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <audio id="audio" src="assets/audio/here-comes-the-sun.mp3" preload="metadata"></audio>
</main>

<footer>twin flame &middot; written under the same sky</footer>

<script>
  // starfield
  (function(){
    var canvas = document.getElementById('sky');
    var ctx = canvas.getContext('2d');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var stars = [];
    var w, h;

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      var count = Math.floor((w * h) / 4200);
      stars = [];
      for(var i = 0; i < count; i++){
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h * 0.92,
          r: Math.random() * 1.3 + 0.3,
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.8
        });
      }
    }

    function drawStatic(){
      ctx.clearRect(0,0,w,h);
      for(var i = 0; i < stars.length; i++){
        var s = stars[i];
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#f5eee0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    var t = 0;
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(var i = 0; i < stars.length; i++){
        var s = stars[i];
        var tw = 0.45 + 0.55 * Math.sin(t * s.speed + s.phase);
        ctx.globalAlpha = Math.max(0, tw);
        ctx.fillStyle = '#f5eee0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      t += 0.02;
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    if(reduceMotion){
      drawStatic();
    } else {
      draw();
    }
  })();

  // typewriter
  (function(){
    var el = document.getElementById('typewriter');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var line1 = "I've always loved the idea of twin flames, the belief that one soul was split into two, destined to find each other again no matter how many lifetimes or worlds stand between them. Whether it's true or not, I like to believe that in this roleplaying world,";
    var line2 = "you're my twin flame, Jorge.";

    var span = document.createElement('span');
    span.className = 'shine';
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(span);
    el.appendChild(cursor);

    var sigLine = document.querySelector('.signature-line') || (function(){
      var p = document.createElement('p');
      p.className = 'signature-line';
      el.parentNode.insertBefore(p, el.nextSibling);
      return p;
    })();
    var sigSpan = document.createElement('span');
    sigSpan.className = 'name';
    sigLine.appendChild(sigSpan);

    function setCursorHeight(target){
      cursor.style.height = '1em';
    }
    setCursorHeight();

    function revealPlayer(){
      document.getElementById('player').classList.add('show');
    }

    if(reduceMotion){
      span.textContent = line1;
      sigSpan.textContent = line2;
      cursor.classList.add('done');
      revealPlayer();
      return;
    }

    var i = 0;
    function typeLine1(){
      if(i < line1.length){
        span.textContent += line1.charAt(i);
        i++;
        var delay = 18 + Math.random() * 32;
        setTimeout(typeLine1, delay);
      } else {
        setTimeout(typeLine2, 700);
      }
    }

    var j = 0;
    function typeLine2(){
      if(j < line2.length){
        sigSpan.textContent += line2.charAt(j);
        j++;
        setTimeout(typeLine2, 55 + Math.random() * 40);
      } else {
        cursor.classList.add('done');
        setTimeout(revealPlayer, 400);
      }
    }

    setTimeout(typeLine1, 500);
  })();

  // audio player
  (function(){
    var audio = document.getElementById('audio');
    var btn = document.getElementById('playBtn');
    var progress = document.getElementById('progress');
    var fill = document.getElementById('progressFill');

    btn.addEventListener('click', function(){
      if(audio.paused){
        audio.play();
        btn.classList.add('playing');
        btn.setAttribute('aria-label', 'Pause Here Comes The Sun');
      } else {
        audio.pause();
        btn.classList.remove('playing');
        btn.setAttribute('aria-label', 'Play Here Comes The Sun');
      }
    });

    audio.addEventListener('timeupdate', function(){
      if(audio.duration){
        fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });

    audio.addEventListener('ended', function(){
      btn.classList.remove('playing');
      btn.setAttribute('aria-label', 'Play Here Comes The Sun');
    });

    progress.addEventListener('click', function(e){
      var rect = progress.getBoundingClientRect();
      var ratio = (e.clientX - rect.left) / rect.width;
      if(audio.duration){
        audio.currentTime = ratio * audio.duration;
      }
    });
  })();
</script>

</body>
</html>
