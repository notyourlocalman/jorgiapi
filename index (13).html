<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Flame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#03040c;
    --void-2:#0a0714;
    --ember:#6e190a;
    --flame:#ff7a2a;
    --gold:#ffd27a;
    --starlight:#f5eee0;
    --ash:#8d877e;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:var(--void);
    overflow-x:hidden;
  }

  body{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    font-family:'Space Mono',monospace;
    color:var(--starlight);
  }

  canvas#sky{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    background:radial-gradient(120% 80% at 50% 100%, #1a0f08 0%, var(--void-2) 45%, var(--void) 100%);
  }

  main{
    position:relative;
    z-index:2;
    width:100%;
    max-width:720px;
    padding:12vh 24px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--ash);
    margin:0 0 28px;
  }

  .typewriter{
    font-size:clamp(16px, 2.6vw, 20px);
    line-height:1.95;
    font-weight:700;
    max-width:640px;
    min-height:1.95em;
    color:var(--starlight);
    text-shadow:0 0 16px rgba(255,210,122,0.3);
  }

  .signature-line{
    margin-top:26px;
    font-size:clamp(20px, 3.4vw, 26px);
    font-family:'Space Mono',monospace;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--gold);
    min-height:1.4em;
    text-shadow:0 0 18px rgba(255,210,122,0.45);
  }

  .cursor{
    display:inline-block;
    width:3px;
    height:1em;
    margin-left:2px;
    background:var(--gold);
    vertical-align:-2px;
    animation:blink 0.9s step-end infinite;
  }

  @keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
  }

  .cursor.done{display:none;}

  .scene{
    position:relative;
    width:100%;
    max-width:640px;
    margin-top:6vh;
    display:flex;
    justify-content:center;
  }

  .scene svg{
    width:100%;
    height:auto;
    display:block;
  }

  .player{
    position:relative;
    z-index:2;
    width:100%;
    max-width:380px;
    margin:2vh 0 8vh;
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 18px;
    border:1px solid rgba(245,238,224,0.14);
    border-radius:999px;
    background:rgba(10,7,20,0.45);
    backdrop-filter:blur(6px);
    opacity:0;
    transform:translateY(8px);
    transition:opacity 1.1s ease, transform 1.1s ease;
  }

  .player.show{
    opacity:1;
    transform:translateY(0);
  }

  .play-btn{
    flex:none;
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    position:relative;
    background:radial-gradient(circle at 35% 30%, var(--gold), var(--flame) 55%, var(--ember) 100%);
    box-shadow:0 0 0 1px rgba(255,210,122,0.3), 0 0 18px rgba(255,122,42,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .play-btn svg{width:16px;height:16px;}
  .play-btn .icon-pause{display:none;}
  .play-btn.playing .icon-play{display:none;}
  .play-btn.playing .icon-pause{display:block;}

  .track-info{
    flex:1;
    min-width:0;
    text-align:left;
  }

  .track-title{
    font-size:13px;
    letter-spacing:0.06em;
    color:var(--starlight);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .track-sub{
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ash);
    margin-top:3px;
  }

  .progress{
    margin-top:8px;
    height:4px;
    border-radius:2px;
    background:rgba(245,238,224,0.12);
    cursor:pointer;
    position:relative;
  }

  .progress-fill{
    position:absolute;
    inset:0 auto 0 0;
    width:0%;
    border-radius:2px;
    background:linear-gradient(90deg, var(--flame), var(--gold));
    pointer-events:none;
  }

  .fallback-link{
    display:block;
    margin-top:6px;
    font-size:10px;
    color:var(--ash);
    text-decoration:underline;
  }

  footer{
    position:relative;
    z-index:2;
    padding-bottom:5vh;
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ash);
    opacity:0.6;
  }

  @media (prefers-reduced-motion: reduce){
    .cursor{animation:none;}
    .flame-group{animation:none !important;}
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<main>
  <p class="eyebrow">a fire kept for two</p>
  <p class="typewriter" id="typewriter" aria-live="polite"></p>

  <div class="scene" aria-hidden="true">
    <svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="fireGlow" cx="50%" cy="55%" r="55%">
          <stop offset="0%" stop-color="#ff9a4d" stop-opacity="0.5"/>
          <stop offset="60%" stop-color="#ff5a1f" stop-opacity="0.14"/>
          <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#6e190a"/>
          <stop offset="45%" stop-color="#d8350f"/>
          <stop offset="100%" stop-color="#ff8a2a"/>
        </linearGradient>
        <linearGradient id="flameMid" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#c92e0e"/>
          <stop offset="50%" stop-color="#ff8a1f"/>
          <stop offset="100%" stop-color="#ffc23d"/>
        </linearGradient>
        <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#ff8a1f"/>
          <stop offset="55%" stop-color="#ffcf4d"/>
          <stop offset="100%" stop-color="#fff3c2"/>
        </linearGradient>
        <linearGradient id="flameCore" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#ffcf4d"/>
          <stop offset="100%" stop-color="#ffffff"/>
        </linearGradient>
        <linearGradient id="logGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#5a3a26"/>
          <stop offset="55%" stop-color="#3c2417"/>
          <stop offset="100%" stop-color="#1c0f08"/>
        </linearGradient>
        <style>
          @keyframes swayBig{0%{transform:rotate(-2.5deg) scaleY(1);}50%{transform:rotate(2.8deg) scaleY(1.04);}100%{transform:rotate(-2.5deg) scaleY(1);}}
          @keyframes swayMid{0%{transform:rotate(3deg) scaleY(1.02);}50%{transform:rotate(-3.2deg) scaleY(0.96);}100%{transform:rotate(3deg) scaleY(1.02);}}
          @keyframes swayCore{0%{transform:rotate(-2deg) scaleX(1);}50%{transform:rotate(2.5deg) scaleX(1.08);}100%{transform:rotate(-2deg) scaleX(1);}}
          @keyframes flicker{0%,100%{opacity:1;}45%{opacity:.82;}70%{opacity:.95;}}
          @keyframes glowPulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
          @keyframes rise{0%{transform:translateY(0) translateX(0);opacity:.9;}100%{transform:translateY(-190px) translateX(var(--dx,8px));opacity:0;}}
          .flameOuter{transform-origin:280px 358px;animation:swayBig 2.6s ease-in-out infinite;}
          .flameMid{transform-origin:280px 352px;animation:swayMid 2.1s ease-in-out infinite;}
          .flameInner{transform-origin:280px 346px;animation:flicker 1.4s ease-in-out infinite, swayBig 1.9s ease-in-out infinite;}
          .flameCore{transform-origin:280px 340px;animation:swayCore 1.5s ease-in-out infinite, flicker 0.9s ease-in-out infinite;}
          .glow{animation:glowPulse 2.4s ease-in-out infinite;}
          .ember{animation:rise 3.4s ease-in infinite;}
        </style>
      </defs>

      <ellipse cx="280" cy="378" rx="220" ry="30" fill="#000" opacity="0.45"/>
      <ellipse class="glow" cx="280" cy="345" rx="230" ry="195" fill="url(#fireGlow)"/>

      <g stroke="#241409" stroke-width="2">
        <rect x="170" y="364" width="150" height="18" rx="7" fill="url(#logGrad)" transform="rotate(-18 245 373)"/>
        <rect x="270" y="364" width="150" height="18" rx="7" fill="url(#logGrad)" transform="rotate(18 345 373)"/>
        <rect x="200" y="367" width="170" height="15" rx="7" fill="url(#logGrad)" transform="rotate(-4 285 374)"/>
      </g>
      <ellipse cx="240" cy="356" rx="11" ry="6" fill="#ff7a2a" opacity="0.85"/>
      <ellipse cx="330" cy="356" rx="11" ry="6" fill="#ff7a2a" opacity="0.85"/>

      <g class="flameOuter"><path d="M280 366 C228 318 222 256 248 206 C224 244 211 282 230 320 C192 268 208 206 256 154 C232 206 244 244 268 264 C280 214 260 168 284 122 C310 168 298 214 316 264 C344 222 336 168 316 116 C354 168 348 230 320 280 C340 252 354 296 332 338 C312 310 304 350 276 366 Z" fill="url(#flameOuter)"/></g>
      <g class="flameMid"><path d="M280 366 C242 318 236 264 260 218 C240 250 230 280 246 312 C216 264 230 210 268 162 C248 210 258 244 282 264 C292 218 274 180 296 138 C320 180 308 222 322 262 C346 226 338 184 320 142 C354 184 348 234 326 274 C342 252 350 286 330 320 C314 300 308 332 290 366 Z" fill="url(#flameMid)"/></g>
      <g class="flameInner"><path d="M280 366 C254 322 252 280 266 246 C250 272 244 296 256 322 C234 286 246 246 274 210 C260 246 270 272 286 288 C294 252 282 222 298 190 C316 222 308 256 320 286 C338 260 334 226 322 196 C346 226 340 264 326 296 C338 282 344 308 332 332 C320 316 316 342 302 366 Z" fill="url(#flameInner)"/></g>
      <g class="flameCore"><path d="M280 366 C262 336 260 306 272 280 C260 300 254 318 264 338 C246 310 256 280 278 254 C268 280 274 300 286 312 C292 288 282 266 294 242 C308 266 300 290 310 312 C324 294 320 268 308 246 C326 268 322 296 308 318 C318 308 322 326 312 342 C302 330 298 348 288 366 Z" fill="url(#flameCore)"/></g>

      <g class="ember" style="--dx:14px;animation-delay:0s"><circle cx="248" cy="296" r="2.6" fill="#ffb24d"/></g>
      <g class="ember" style="--dx:-10px;animation-delay:.6s"><circle cx="318" cy="282" r="2.2" fill="#ff8a2a"/></g>
      <g class="ember" style="--dx:6px;animation-delay:1.2s"><circle cx="282" cy="304" r="2" fill="#ffd27a"/></g>
      <g class="ember" style="--dx:-16px;animation-delay:1.8s"><circle cx="338" cy="290" r="2.4" fill="#ff8a2a"/></g>
      <g class="ember" style="--dx:10px;animation-delay:2.4s"><circle cx="296" cy="318" r="1.8" fill="#ffb24d"/></g>
      <g class="ember" style="--dx:-6px;animation-delay:0.9s"><circle cx="232" cy="312" r="2" fill="#ffd27a"/></g>
      <g class="ember" style="--dx:18px;animation-delay:1.5s"><circle cx="324" cy="270" r="1.8" fill="#ff8a2a"/></g>
    </svg>
  </div>

  <div class="player" id="player">
    <button class="play-btn" id="playBtn" type="button" aria-label="Play Here Comes The Sun">
      <svg class="icon-play" viewBox="0 0 24 24" fill="none"><path d="M7 5v14l12-7L7 5z" fill="#1c0f08"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" fill="none"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" fill="#1c0f08"/></svg>
    </button>
    <div class="track-info">
      <div class="track-title">Here Comes The Sun</div>
      <div class="track-sub">for Jorge</div>
      <div class="progress" id="progress"><div class="progress-fill" id="progressFill"></div></div>
      <a class="fallback-link" id="fallbackLink" href="assets/audio/here-comes-the-sun.mp3" style="display:none;">trouble playing? open the file directly</a>
    </div>
  </div>

  <audio id="audio" src="assets/audio/here-comes-the-sun.mp3" preload="auto"></audio>
</main>

<footer>twin flame &middot; written under the same sky</footer>

<script>
  // starfield
  (function(){
    var canvas = document.getElementById('sky');
    var ctx = canvas.getContext('2d');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var stars = [];
    var w, h;

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      var count = Math.floor((w * h) / 4200);
      stars = [];
      for(var i = 0; i < count; i++){
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h * 0.92,
          r: Math.random() * 1.3 + 0.3,
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.8
        });
      }
    }

    function drawStatic(){
      ctx.clearRect(0,0,w,h);
      for(var i = 0; i < stars.length; i++){
        var s = stars[i];
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#f5eee0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    var t = 0;
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(var i = 0; i < stars.length; i++){
        var s = stars[i];
        var tw = 0.45 + 0.55 * Math.sin(t * s.speed + s.phase);
        ctx.globalAlpha = Math.max(0, tw);
        ctx.fillStyle = '#f5eee0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      t += 0.02;
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    if(reduceMotion){
      drawStatic();
    } else {
      draw();
    }
  })();

  // typewriter
  (function(){
    var el = document.getElementById('typewriter');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var line1 = "I've always loved the idea of twin flames, the belief that one soul was split into two, destined to find each other again no matter how many lifetimes or worlds stand between them. Whether it's true or not, I like to believe that in this roleplaying world,";
    var line2 = "you're my twin flame, Jorge.";

    var span = document.createElement('span');
    el.appendChild(span);
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);

    var sigLine = document.createElement('p');
    sigLine.className = 'signature-line';
    el.parentNode.insertBefore(sigLine, el.nextSibling);
    var sigSpan = document.createElement('span');
    sigLine.appendChild(sigSpan);

    function revealPlayer(){
      document.getElementById('player').classList.add('show');
    }

    if(reduceMotion){
      span.textContent = line1;
      sigSpan.textContent = line2;
      cursor.classList.add('done');
      revealPlayer();
      return;
    }

    var i = 0;
    function typeLine1(){
      if(i < line1.length){
        span.textContent += line1.charAt(i);
        i++;
        var delay = 18 + Math.random() * 32;
        setTimeout(typeLine1, delay);
      } else {
        setTimeout(typeLine2, 700);
      }
    }

    var j = 0;
    function typeLine2(){
      if(j < line2.length){
        sigSpan.textContent += line2.charAt(j);
        j++;
        setTimeout(typeLine2, 55 + Math.random() * 40);
      } else {
        cursor.classList.add('done');
        setTimeout(revealPlayer, 400);
      }
    }

    setTimeout(typeLine1, 500);
  })();

  // audio player
  (function(){
    var audio = document.getElementById('audio');
    var btn = document.getElementById('playBtn');
    var progress = document.getElementById('progress');
    var fill = document.getElementById('progressFill');
    var fallback = document.getElementById('fallbackLink');

    function setPlaying(isPlaying){
      if(isPlaying){
        btn.classList.add('playing');
        btn.setAttribute('aria-label', 'Pause Here Comes The Sun');
      } else {
        btn.classList.remove('playing');
        btn.setAttribute('aria-label', 'Play Here Comes The Sun');
      }
    }

    btn.addEventListener('click', function(){
      if(audio.paused){
        var playPromise = audio.play();
        if(playPromise !== undefined){
          playPromise.then(function(){
            setPlaying(true);
          }).catch(function(err){
            console.error('Playback failed:', err);
            fallback.style.display = 'block';
          });
        } else {
          setPlaying(true);
        }
      } else {
        audio.pause();
        setPlaying(false);
      }
    });

    audio.addEventListener('error', function(){
      fallback.style.display = 'block';
    });

    audio.addEventListener('timeupdate', function(){
      if(audio.duration){
        fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });

    audio.addEventListener('ended', function(){
      setPlaying(false);
    });

    progress.addEventListener('click', function(e){
      var rect = progress.getBoundingClientRect();
      var ratio = (e.clientX - rect.left) / rect.width;
      if(audio.duration){
        audio.currentTime = ratio * audio.duration;
      }
    });
  })();
</script>

</body>
</html>
